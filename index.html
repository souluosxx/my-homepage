<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颜空间</title>
    <link rel="icon" href="tp.jpg" type="image/jpg">
    <style>
        /* ==================================================
           1. 全局变量与赛博基础样式
        ================================================== */
        :root {
            --color-primary: #00f2fe;
            --color-secondary: #4facfe;
            --color-bg: #000;
            --color-card-bg: rgba(10, 10, 15, 0.4); 
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
            background-color: var(--color-bg);
            color: #fff;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            margin: 0;
        }

        /* ==================================================
           2. 玻璃拟态卡片 (主容器)
        ================================================== */
        .card {
            background-color: var(--color-card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px; padding: 40px; text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            transition: var(--transition);
            max-width: 450px; width: 90%;
            position: relative; overflow: hidden;
            z-index: 10;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 242, 254, 0.3);
            box-shadow: 0 20px 50px rgba(0, 242, 254, 0.15);
        }

        .card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--color-primary), var(--color-secondary), var(--color-primary));
            background-size: 200% 100%; animation: gradientScan 3s linear infinite;
        }
        @keyframes gradientScan { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .avatar {
            width: 90px; height: 90px; border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            margin: 0 auto 15px; display: block;
            object-fit: cover; transition: var(--transition);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        .card:hover .avatar { transform: rotate(5deg) scale(1.05); border-color: var(--color-primary); box-shadow: 0 0 25px var(--color-primary);}

        .name {
            font-size: 24px; font-weight: 700; margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* ==================================================
           3. 按钮布局 (两列)
        ================================================== */
        .link-group { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }

        .link-btn {
            display: block; padding: 12px;
            color: #fff; text-decoration: none; font-size: 14px;
            border-radius: 8px; background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: var(--transition);
            white-space: nowrap;
        }

        .link-btn:hover {
            background-color: var(--color-primary);
            color: #000; font-weight: 600;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
            border-color: transparent;
        }

        /* ==================================================
           4. 音乐播放器 (居中与紧凑布局)
        ================================================== */
        #music-player {
            position: fixed; bottom: 20px; right: 20px; width: 360px;
            background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 254, 0.15); border-radius: 15px;
            padding: 18px; z-index: 100;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }
        #music-player.expanded {
            width: 400px; height: 500px;
            border-color: rgba(0, 242, 254, 0.5);
            box-shadow: 0 10px 40px rgba(0, 242, 254, 0.2);
        }

        /* 歌单容器 */
        .playlist-container {
            max-height: 0;
            overflow-y: auto;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 0px solid rgba(255,255,255,0.1);
            opacity: 0;
        }
        .playlist-container.show {
            max-height: 250px; 
            margin-bottom: 12px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            opacity: 1;
        }
        .playlist-container::-webkit-scrollbar { width: 4px; }
        .playlist-container::-webkit-scrollbar-thumb { background: var(--color-primary); border-radius: 2px; }

        .playlist-item {
            font-size: 13px; color: rgba(255,255,255,0.6); padding: 8px 5px;
            cursor: pointer; border-radius: 4px; transition: 0.2s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .playlist-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .playlist-item.active { color: var(--color-primary); font-weight: bold; }

        /* ✨ 修复：文字绝对居中 */
        .song-info { 
            display: flex; 
            flex-direction: column; 
            align-items: center; /* 整体居中 */
            margin-bottom: 12px; 
            gap: 10px; 
        }
        
        .song-name-text { 
            font-weight: bold; 
            font-size: 15px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            width: 100%; 
            text-align: center; /* 文字内部居中 */
            color: var(--color-primary);
        }
        
        /* ✨ 修复：按钮变小并聚拢 */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: center; /* 按钮向中间聚拢 */
            width: 100%;
            gap: 10px; /* 按钮间距 */
        }

        .ctrl-btn { 
            /* 删除了 flex: 1，让按钮不再强制拉伸 */
            justify-content: center; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px;
            color: #fff; cursor: pointer; 
            padding: 5px 12px; /* 缩小了上下高度，增加了左右内边距，使其更精致 */
            display: flex; align-items: center; gap: 4px;
            transition: 0.3s; outline: none;
        }
        .ctrl-btn .icon { font-size: 13px; }
        .ctrl-btn .label { font-size: 11px; color: rgba(255,255,255,0.8); white-space: nowrap;}
        
        .ctrl-btn:hover { 
            background: rgba(0, 242, 254, 0.15); 
            border-color: var(--color-primary); 
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
            transform: translateY(-2px); 
        }
        .ctrl-btn:hover .label { color: #fff; }

        /* 进度条 */
        .progress-container {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1); 
            border-radius: 3px; cursor: pointer; position: relative; margin-bottom: 10px;
        }
        .progress-bar {
            height: 100%; background: var(--color-primary); border-radius: 3px; width: 0%;
            box-shadow: 0 0 10px var(--color-primary); pointer-events: none;
        }
        .time-info { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px;}

        /* 歌词区 */
        #lrc-container {
            height: 50px; overflow-y: auto; text-align: center; position: relative; scroll-behavior: smooth;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
            transition: height 0.4s ease;
        }
        #music-player.expanded #lrc-container { flex: 1; height: auto; }
        #lrc-container::-webkit-scrollbar { display: none; }
        #lrc-container { -ms-overflow-style: none; scrollbar-width: none; }

        .lrc-spacer { height: 180px; } 
        .lrc-line { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 28px; transition: all 0.3s; padding: 0 10px;}
        .lrc-line.active { color: #fff; font-size: 15px; font-weight: bold; text-shadow: 0 0 10px var(--color-primary); transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="card">
        <img src="tp.jpg" alt="头像" class="avatar">
        <h1 class="name">颜空间</h1>
        <h3 style="margin-bottom: 15px; font-size: 14px; color: var(--color-primary); letter-spacing: 2px;">✨ 点击跳转 ✨</h3>
        <div class="link-group">
            <a href="knowledge.html" target="_blank" class="link-btn">🌌 知识库</a>
            <a href="linux.html" target="_blank" class="link-btn">🌌 命令库</a>
        </div>
    </div>

    <div id="music-player">
        <div id="playlist-container" class="playlist-container"></div>

        <audio id="main-audio"></audio>
        
        <div class="song-info">
            <div id="song-name" class="song-name-text">正在加载...</div>
            
            <div class="controls-row">
                <button class="ctrl-btn" onclick="togglePlaylist()" title="展开/收起歌单">
                    <span class="icon">📜</span><span class="label">歌单</span>
                </button>
                <button class="ctrl-btn" id="expand-btn" onclick="toggleExpand()" title="展开/收起歌词">
                    <span class="icon" id="expand-icon">🔼</span><span class="label" id="expand-label">歌词</span>
                </button>
                <button class="ctrl-btn" id="play-btn" onclick="togglePlay()" title="播放/暂停">
                    <span class="icon" id="play-icon">▶️</span><span class="label" id="play-label">播放</span>
                </button>
                <button class="ctrl-btn" onclick="nextSong()" title="下一首">
                    <span class="icon">⏭️</span><span class="label">切歌</span>
                </button>
            </div>
        </div>

        <div class="progress-container" id="progress-container" onclick="seekAudio(event)">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="time-info">
            <span id="time-current">00:00</span>
            <span id="time-total">00:00</span>
        </div>
        <div id="lrc-container">
            <div id="lrc-list"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.001); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.z = 400; 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.domElement.style.position = 'fixed';
        renderer.domElement.style.top = '0';
        renderer.domElement.style.zIndex = '-1';
        document.body.appendChild(renderer.domElement);

        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }

        const starGeo = new THREE.BufferGeometry();
        const starCount = 8000;
        const starPos = new Float32Array(starCount * 3);
        const starVelocity = []; 

        for(let i=0; i<starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 2000;     
            starPos[i*3+1] = (Math.random() - 0.5) * 2000;   
            starPos[i*3+2] = (Math.random() - 0.5) * 2000;   
            starVelocity.push(Math.random() * 2 + 1);        
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        
        const starMat = new THREE.PointsMaterial({
            color: 0x00f2fe, 
            size: 1.5,
            map: createGlowTexture(),
            transparent: true,
            blending: THREE.AdditiveBlending, 
            depthWrite: false
        });

        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animateWarp() {
            requestAnimationFrame(animateWarp);
            
            const positions = starGeo.attributes.position.array;
            for(let i=0; i<starCount; i++) {
                positions[i*3+2] += starVelocity[i] * 5; 
                
                if(positions[i*3+2] > 400) {
                    positions[i*3+2] = -1600;
                    positions[i*3] = (Math.random() - 0.5) * 2000; 
                    positions[i*3+1] = (Math.random() - 0.5) * 2000; 
                }
            }
            starGeo.attributes.position.needsUpdate = true;

            camera.position.x += (mouseX * 100 - camera.position.x) * 0.05;
            camera.position.y += (mouseY * 100 - camera.position.y) * 0.05;
            camera.lookAt(0, 0, -1000); 

            renderer.render(scene, camera);
        }
        animateWarp();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

    <script>
        const playlist = [
            { name: "恋人 - 李荣浩", src: "恋人 - 李荣浩.mp3", lrc: "恋人 - 李荣浩.lrc" },
            { name: "还是会想你 - 林达浪、h3R3", src: "还是会想你 - 林达浪、h3R3.mp3", lrc: "还是会想你 - 林达浪、h3R3.lrc" },
            { name: "罗生门（Follow） - 梨冻紧、Wiz_H张子豪", src: "罗生门（Follow） - 梨冻紧、Wiz_H张子豪.mp3", lrc: "罗生门（Follow） - 梨冻紧、Wiz_H张子豪.lrc" },
            { name: "如果呢 - 郑润泽", src: "如果呢 - 郑润泽.mp3", lrc: "如果呢 - 郑润泽.lrc" },
            { name: "忘不掉的你 - h3R3", src: "忘不掉的你 - h3R3.mp3", lrc: "忘不掉的你 - h3R3.lrc" },
            { name: "想你和我们的以后 - 苏运莹", src: "/music/想你和我们的以后 - 苏运莹.flac", lrc: "/music/想你和我们的以后 - 苏运莹.lrc" },
            { name: "不被祝福的幸福 - 杨丞琳", src: "/music/不被祝福的幸福 - 杨丞琳.mp3", lrc: "/music/不被祝福的幸福 - 杨丞琳.lrc" },
            { name: "嗜好 - 颜人中", src: "/music/嗜好 - 颜人中.mp3", lrc: "/music/嗜好 - 颜人中.lrc" },
            { name: "特别的人 - 方大同", src: "/music/特别的人 - 方大同.mp3", lrc: "/music/特别的人 - 方大同.lrc" },
            { name: "想你和我们的以后 - 苏运莹", src: "/music/想你和我们的以后 - 苏运莹.mp3", lrc: "/music/想你和我们的以后 - 苏运莹.lrc" },
            { name: "于是 - 郑润泽", src: "/music/于是 - 郑润泽.mp3", lrc: "/music/于是 - 郑润泽.lrc" }
        ];
        let songIndex = 0;
        let lrcData = [];
        let isExpanded = false;
        
        const audio = document.getElementById('main-audio');
        const lrcContainer = document.getElementById('lrc-container');
        const lrcList = document.getElementById('lrc-list');
        const playerBox = document.getElementById('music-player');
        
        const progressBar = document.getElementById('progress-bar');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');
        
        function renderPlaylistUI() {
            const container = document.getElementById('playlist-container');
            container.innerHTML = playlist.map((song, i) => 
                `<div class="playlist-item" id="playlist-item-${i}" onclick="playSpecificSong(${i})">${i + 1}. ${song.name}</div>`
            ).join('');
        }

        function togglePlaylist() {
            const container = document.getElementById('playlist-container');
            container.classList.toggle('show');
        }

        function playSpecificSong(idx) {
            songIndex = idx;
            loadSong(songIndex);
            audio.play();
            document.getElementById('play-icon').innerText = '⏸️';
            document.getElementById('play-label').innerText = '暂停';
        }

        async function loadSong(idx) {
            const song = playlist[idx];
            document.getElementById('song-name').innerText = song.name;
            audio.src = song.src;
            progressBar.style.width = '0%';
            timeCurrent.innerText = "00:00";
            timeTotal.innerText = "00:00";
            
            document.querySelectorAll('.playlist-item').forEach((el, i) => {
                el.classList.toggle('active', i === idx);
            });
            
            lrcList.innerHTML = '<div class="lrc-spacer"></div><div class="lrc-line">歌词加载中...</div><div class="lrc-spacer"></div>';
            
            try {
                const res = await fetch(song.lrc);
                if (!res.ok) throw new Error();
                const text = await res.text();
                parseLrc(text);
            } catch (e) {
                lrcList.innerHTML = '<div class="lrc-spacer"></div><div class="lrc-line">纯音乐或暂无歌词</div><div class="lrc-spacer"></div>';
                lrcData = [];
            }
        }

        function formatTime(seconds) {
            if(isNaN(seconds)) return "00:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
        }

        audio.addEventListener('loadedmetadata', () => {
            timeTotal.innerText = formatTime(audio.duration);
        });

        function parseLrc(text) {
            lrcData = [];
            const lines = text.split('\n');
            lines.forEach(line => {
                const match = line.match(/\[(\d{2,}):(\d{2}(?:\.\d{1,3})?)\](.*)/);
                if (match && match[3].trim()) {
                    lrcData.push({ time: parseInt(match[1]) * 60 + parseFloat(match[2]), text: match[3].trim() });
                }
            });
            let html = '<div class="lrc-spacer"></div>';
            html += lrcData.map((l, i) => `<div class="lrc-line" id="lrc-${i}">${l.text}</div>`).join('');
            html += '<div class="lrc-spacer"></div>';
            lrcList.innerHTML = html;
        }

        audio.ontimeupdate = () => {
            if(isNaN(audio.duration)) return;
            const cur = audio.currentTime;
            
            const progressPercent = (cur / audio.duration) * 100;
            progressBar.style.width = progressPercent + '%';
            timeCurrent.innerText = formatTime(cur);

            if(lrcData.length > 0) {
                let index = lrcData.findIndex((l, i) => cur >= l.time && (!lrcData[i+1] || cur < lrcData[i+1].time));
                if (index !== -1) {
                    const currentActive = document.querySelector('.lrc-line.active');
                    const newActive = document.getElementById(`lrc-${index}`);
                    if (currentActive !== newActive) {
                        if (currentActive) currentActive.classList.remove('active');
                        if (newActive) newActive.classList.add('active');
                        scrollToActiveLine();
                    }
                }
            }
        };

        function seekAudio(e) {
            if(isNaN(audio.duration)) return;
            const container = document.getElementById('progress-container');
            const clickX = e.offsetX;
            const width = container.clientWidth;
            const seekTime = (clickX / width) * audio.duration;
            audio.currentTime = seekTime;
        }

        function scrollToActiveLine() {
            const activeLine = document.querySelector('.lrc-line.active');
            if (activeLine) {
                const offset = activeLine.offsetTop - lrcContainer.clientHeight / 2 + activeLine.clientHeight / 2;
                lrcContainer.scrollTo({ top: offset, behavior: 'smooth' });
            }
        }

        function toggleExpand() {
            isExpanded = !isExpanded;
            if (isExpanded) {
                playerBox.classList.add('expanded');
                document.getElementById('expand-icon').innerText = '🔽';
                document.getElementById('expand-label').innerText = '收起';
            } else {
                playerBox.classList.remove('expanded');
                document.getElementById('expand-icon').innerText = '🔼';
                document.getElementById('expand-label').innerText = '歌词';
            }
            setTimeout(scrollToActiveLine, 400); 
        }

        function togglePlay() {
            if (audio.paused) { 
                audio.play(); 
                document.getElementById('play-icon').innerText = '⏸️'; 
                document.getElementById('play-label').innerText = '暂停';
            } else { 
                audio.pause(); 
                document.getElementById('play-icon').innerText = '▶️'; 
                document.getElementById('play-label').innerText = '播放';
            }
        }

        function nextSong() {
            songIndex = (songIndex + 1) % playlist.length;
            loadSong(songIndex);
            audio.play();
            document.getElementById('play-icon').innerText = '⏸️';
            document.getElementById('play-label').innerText = '暂停';
        }

        audio.addEventListener("ended", nextSong);
        
        window.onload = () => {
            renderPlaylistUI();
            loadSong(0);
        };
    </script>
</body>
</html>
