<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术知识中心 | Knowledge Terminal</title>
    <style>
        :root {
            --color-primary: #1890ff;
            --color-bg: #f0f2f5;
            --color-surface: #ffffff;
            --color-text-main: #333333;
            --color-text-sub: #666666;
            --color-border: #e8e8e8;
            --transition: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* 侧边栏导航 */
        .sidebar {
            width: 240px;
            background: var(--color-surface);
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.05);
            z-index: 10;
        }
        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 24px;
            text-align: center;
            color: #111;
        }
        .nav-item {
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: var(--color-text-sub);
            transition: var(--transition);
        }
        .nav-item:hover { background: rgba(24, 144, 255, 0.05); color: var(--color-primary); }
        .nav-item.active { background: rgba(24, 144, 255, 0.1); color: var(--color-primary); font-weight: 600; }

        /* 主内容区与搜索 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px 32px;
            overflow-y: auto;
        }
        .header-tools {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        input#searchBar {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
            transition: var(--transition);
        }
        input#searchBar:focus { border-color: var(--color-primary); box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
        .back-home {
            padding: 12px 20px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            text-decoration: none;
            color: var(--color-text-sub);
            background: var(--color-surface);
            transition: var(--transition);
            white-space: nowrap;
        }
        .back-home:hover { color: var(--color-primary); border-color: var(--color-primary); }

        /* 卡片网格布局 */
        .card-list {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
        }
        .info-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }
        .info-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-2px); }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .card-title { font-size: 16px; font-weight: 600; color: #111; line-height: 1.4; flex: 1; margin-right: 10px;}
        .card-tag { font-size: 12px; background: #e6f7ff; color: var(--color-primary); padding: 2px 8px; border-radius: 4px; border: 1px solid #91d5ff; white-space: nowrap; height: fit-content;}
        
        /* 核心：带有一键复制的 pre 代码块 */
        .cmd-wrapper {
            position: relative;
            margin-bottom: 16px;
        }
        .cmd-wrapper pre {
            background: #f5f5f5;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            color: #eb2f96; /* 醒目的命令行颜色 */
            line-height: 1.5;
            white-space: pre-wrap; /* 允许长命令自动换行 */
        }
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ffffff;
            border: 1px solid #d9d9d9;
            color: var(--color-text-sub);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
            opacity: 0; /* 默认隐藏 */
        }
        .cmd-wrapper:hover .copy-btn { opacity: 1; /* 鼠标悬停代码块时显示按钮 */ }
        .copy-btn:hover { color: var(--color-primary); border-color: var(--color-primary); }
        .copy-btn.success { background: #52c41a; color: white; border-color: #52c41a; opacity: 1; }

        .card-desc { font-size: 14px; color: var(--color-text-sub); line-height: 1.6; margin-top: auto; white-space: pre-wrap;}
        .author-tag { font-size: 12px; color: #999; margin-top: 10px; text-align: right; font-style: italic;}

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 12px; border-bottom: 1px solid var(--color-border); }
            .card-list { grid-template-columns: 1fr; }
            .cmd-wrapper .copy-btn { opacity: 1; } /* 移动端始终显示复制按钮 */
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>知识库</h2>
        <div class="nav-item active" onclick="switchTab('ICFS')">ICFS 命令</div>
        <div class="nav-item" onclick="switchTab('GPFS')">GPFS 维护</div>
        <div class="nav-item" onclick="switchTab('HARDWARE')">硬件运维</div>
        <div class="nav-item" onclick="switchTab('CASES')">典型案例</div>
        <div class="nav-item" onclick="switchTab('POLICY')">政策与密码</div>
    </div>

    <div class="main-content">
        <div class="header-tools">
            <input type="text" id="searchBar" placeholder="全局搜索：输入命令、报错信息或案例描述..." oninput="filterCards()">
            <a href="index.html" class="back-home">返回首页</a>
        </div>
        <div class="card-list" id="cardContainer">
            </div>
    </div>

            { "cat": "GPFS", "title": "查看集群中所有的 RG 列表", "cmd": "mmvdisk rg list", "desc": "（暂无详细说明）", "author": "杨颜宁" },
            { "cat": "GPFS", "title": "显示GPFS集群的当前配置信息", "cmd": "mmlscluster", "desc": "（暂无详细说明）", "author": "杨颜宁" },
            { "cat": "GPFS", "title": "刷新告警状态", "cmd": "1.若告警节点为计算节点，在该计算节点上执行以下命令刷新告警状态：该命令仅用于更新告警状态，不影响业务正常运行。\n2.若告警节点为存储节点，或执行上述命令后告警仍未消除，请拨打浪潮售后服务电话咨询处理。\n/usr/lpp/mmfs/bin/mmsysmoncontrol  restart", "desc": "注意：GUI界面展示的告警信息并非实时更新，存在一定延迟。部分告警会随问题自动解决而同步消除，另有部分告警需通过上述命令手动刷新撤销", "author": "冯立晓" },
            { "cat": "GPFS", "title": "gpfs的gui管理平台账号密码设置永久生效", "cmd": "/usr/lpp/mmfs/gui/cli/chuser admin -e 1", "desc": "需要在gui的节点上执行", "author": "付壮壮" },

            // ================= 硬件运维 =================
            { "cat": "HARDWARE", "title": "查看单节点raid卡型号、硬盘及固件信息", "cmd": "lsscsi    ", "desc": "[0:0:0:0]    disk    ATA    ST16000NM001G-2K SN03    /dev/sdb    /dev/sg1\n[0:0:1:0]    disk    ATA    ST16000NM001G-2K SN03    /dev/sdc    /dev/sg2\n[0:0:2:0]    disk    ATA    ST16000NM001G-2K SN03    /dev/sdd    /dev/sg3", "author": "冯立晓" },
            { "cat": "HARDWARE", "title": "点亮节点定位灯", "cmd": "ipmitool chassis identify force", "desc": "（暂无详细说明）", "author": "冯立晓" },
            { "cat": "HARDWARE", "title": "查看 RAID状态和故障成员盘的槽位", "cmd": "SAS3008:sas3ircu <index> status\nSAS9361/SAS9440/SAS9460:storcli64 /cx/vall show all\nPM8222/PM8204:arcconf <controller id> getconfig ld", "desc": "（暂无详细说明）", "author": "冯立晓" },
            { "cat": "HARDWARE", "title": "RAID1 成员盘状态切换 (SAS9361/9440/9460)", "cmd": "UBad 切换成 UGood/F：storcli64 /cx/ex/sx set good force\nUGood/F 切换成 UGood：storcli64 /cx/fall delete\nJBOD 切换成 UGood：storcli64 /cx/ex/sx set good force", "desc": "只有更换的硬盘的状态为 UGood，RAID 卡才能自动重构", "author": "冯立晓" },
            { "cat": "HARDWARE", "title": "系统盘点灯", "cmd": "1、通过smartctl命令获取硬盘序列号\n2、通过sas3ircu 0 display | grep 硬盘序列号  确定磁盘槽位号，slot即为槽位号\n3、sas3ircu 0 locate 2:槽位号 on点亮", "desc": "（暂无详细说明）", "author": "冯立晓" },
            { "cat": "HARDWARE", "title": "关闭蜂鸣声", "cmd": "storcli64 /c0 set alarm=silence", "desc": "（暂无详细说明）", "author": "冯立晓" },
            { "cat": "HARDWARE", "title": "清除BMC告警日志", "cmd": "ipmitool sel clear", "desc": "（暂无详细说明）", "author": "冯立晓" },
            { "cat": "HARDWARE", "title": "重启BMC", "cmd": "ipmitool mc reset cold", "desc": "（暂无详细说明）", "author": "冯立晓" },
            { "cat": "HARDWARE", "title": "列出pcie设备（通过报错的BDF号定位pcue设备）", "cmd": "lspci -vt", "desc": "（暂无详细说明）", "author": "冯立晓" },
            { "cat": "HARDWARE", "title": "查看nvme的bdf", "cmd": "ll /sys/block/nvme*", "desc": "（暂无详细说明）", "author": "冯立晓" },
            { "cat": "HARDWARE", "title": "点亮网口灯", "cmd": "ethtool -p 网口名", "desc": "（暂无详细说明）", "author": "付壮壮" },
            { "cat": "HARDWARE", "title": "查看集群所有的cpu温度", "cmd": "ansible all -m shell -a 'ipmitool sensor list'Igrep -i 'cpu'lgrep-i 'temp'Igrep -i 'core'", "desc": "（暂无详细说明）", "author": "王朝阳" },
            { "cat": "HARDWARE", "title": "查看设备的序列号", "cmd": "ipmitool fru", "desc": "（暂无详细说明）", "author": "付壮壮" },
            { "cat": "HARDWARE", "title": "查看bmc的IP", "cmd": "ipmitool  lan  print 1", "desc": "（暂无详细说明）", "author": "付壮壮" },
            { "cat": "HARDWARE", "title": "重置BMC指定账户密码", "cmd": "ipmitool user list 1\nipmitool user set password <用户ID> <新密码>", "desc": "（暂无详细说明）", "author": "杨颜宁" },
            { "cat": "HARDWARE", "title": "添加新BMC用户密码", "cmd": "ipmitool user set name 2 admin2 # 设置ID为2的用户名admin2\nipmitool user set password 2 admin123456789 # 设置ID为2的用户密码为admin123456789\nipmitool user priv 2 4 1 # 设置ID为2的用户在通道1的权限为管理员级（4级）\nipmitool user enable 2 # 启用ID为2的用户", "desc": "（暂无详细说明）", "author": "杨颜宁" },
            { "cat": "HARDWARE", "title": "查看网卡的速率", "cmd": "ethtool 网卡名 | grep -i \"Speed\\|Supported link modes\"", "desc": "（暂无详细说明）", "author": "付壮壮" },
            { "cat": "HARDWARE", "title": "beeGFS 换盘", "cmd": "beegfs产品全部都是做的硬raid，一般换盘直接拔插即可，更换完成后关注硬盘重构和raid状态（使用raid卡的命令）", "desc": "（暂无详细说明）", "author": "杨颜宁" },
            { "cat": "HARDWARE", "title": "ipmitool 配置IP", "cmd": "ipmitool lan set 1 ipsrc static  设置成静态\nipmitool lan set 1 ipaddr {IP}  设置IP地址\nipmitool lan set 1 netmask {掩码}  设置子网掩码\nipmitool lan set 1 defgw ipaddr {网关}  设置网关\nipmitool lan set 1 access on 允许远程用户通过这个通道访问 BMC\nipmitool lan print   打印配置", "desc": "（暂无详细说明）", "author": "杨颜宁" },
            { "cat": "HARDWARE", "title": "重新加载驱动ipmitool驱动", "cmd": "modprobe -r ipmi_si\nmodprobe -r ipmi_devintf\nmodprobe -r ipmi_watchdog \nmodprobe -r ipmi_msghander\nmodprobe ipmi_msghander\nmodprobe ipmi_devintf\nmodprobe ipmi_si\nsystemctl restart watchdog", "desc": "（暂无详细说明）", "author": "杨颜宁" },

            // ================= 典型案例 =================
            { "cat": "CASES", "title": "[ICFS] 换盘", "cmd": "1、高水位换盘用换盘脚本upmap_disk_change.sh，步骤参照readme\n2、老版本设备视图不显示槽位号，按从左到右从上到下的顺序从0开始数即可\n3、管软根据槽位如果查到的盘不对，有可能是误报（前期换过盘告警没清除）\n4、不能准确定位盘的时候可以尝试拔出盘确认，不对的话再及时插回去，没有影响", "desc": "（暂无详细说明）", "author": "冯立晓" },
            { "cat": "CASES", "title": "[ICFS] NTP调整", "cmd": "38720及之后的版本支持NTP换时钟源，可以在管软直接修改，会自动慢慢的同步；更低的版本每次调整20S", "desc": "（暂无详细说明）", "author": "冯立晓" },
            { "cat": "CASES", "title": "[GPFS] 重启GUI报错：Failed to allocate directory watch", "cmd": "# 调整inotify最大监控目录数\necho 524288 > /proc/sys/fs/inotify/max_user_watches\n # 调整inotify最大实例数\necho 256 > /proc/sys/fs/inotify/max_user_instances\n\n修改 inotify 资源限制：编辑 /etc/sysctl.conf，添加以下内容：\n    fs.inotify.max_user_watches = 524288\n    fs.inotify.max_user_instances = 256\nsysctl -p然后再重启试一下systemctl restart gpfsgui.service", "desc": "故障原因: inotify默认值不够", "author": "冯立晓" },
            { "cat": "CASES", "title": "[GPFS] GPFS节点上无法执行mmvdisk等命令", "cmd": "# 复制单个mmvdisk可执行文件到目标节点（替换node02为实际节点名）\nscp /usr/lpp/mmfs/bin/mmvdisk root@node02:/usr/lpp/mmfs/bin/\n# 若有依赖库，复制整个bin目录（按需）\nscp -r /usr/lpp/mmfs/bin/ root@node02:/usr/lpp/mmfs/bin/\n# 加gpfs环境变量\necho \"PATH=/sbin:/usr/sbin:/usr/local/sbin:/usr/lpp/mmfs/bin/:\\$PATH\" >> /root/.bash_profile\nsource /root/.bash_profile", "desc": "故障原因: 环境安装有问题", "author": "冯立晓" },
            { "cat": "CASES", "title": "[DP2000] DP2000删除备份数据", "cmd": "1、zfs list找到占用多的任务，\n2、界面在备份集里失效这个任务的历史备份集，等几个小时看空间回收吗？\n3、回收的话，优化占用空间多的任务的策略，移除旧策略，添加新策略。\n4、不回收的话，导出这个任务详情（做备份），删除任务；后台清理空间，方法如下:zfs list 查到占用空间最多的任务对应的name，客户确认可删除后，用 zfs destroy -r  查到的name值 删除；如提示有依赖，先删除依赖任务\n5、根据导出的任务详情，重新创建任务，建新的策略", "desc": "故障原因: 任务异常终止，备份数据没有清除，额外占用空间", "author": "冯立晓" },
            { "cat": "CASES", "title": "[DP2000] DP2000密码重置", "cmd": "一 若忘记用户密码，可使用 nvicat 工具连接数据库（主机填服务端 IP，端口为 41000，用户名和密码都为 msa），找到 msa 库 userinfo 表中的 username 字段对应的用户名，在 password 字段输入a66abb5684c45962d887564f08346e8d后保存，可将密码重置为 admin123456\n二 若使用命令行去修改密码  参考命令行修改手册  若dp2000版本为20230323等  需要在连接数据库时加上    -h 127.0.0.1", "desc": "故障原因: 忘记密码", "author": "冯立晓" },
            { "cat": "CASES", "title": "[DP2000] 代理端报连接错误", "cmd": "systemctl status MSABackupAgent\nsystemctl restart MSABackupAgent", "desc": "故障原因: 代理端服务异常", "author": "冯立晓" },
            { "cat": "CASES", "title": "[带库] 收集带库和驱动器日志", "cmd": "感谢您选择了IBM的磁带库设备，关于drive故障问题，请按照以下方式收集log进一步分析：\n1）Library中第一个子菜单（dashboard）> Actions > Export Library Logs\n2）drive dump: Drives > Actions->export drive log，下载报错相关驱动器的drive log。\n3)  相关报错截图", "desc": "（暂无详细说明）", "author": "冯立晓" },
            { "cat": "CASES", "title": "[ICFS] 某节点负载过高", "cmd": "1、检查：df -h  #查看/var/log 是否 有足够空间\n                 free -h  #查看节点内存是否充足\n                 top         #查看那个服务占用资源比较高\n2，如发现smb，ganesha，tgtd  占用资源过高，就重启一下对应服务", "desc": "故障原因: 系统服务内存泄漏", "author": "付壮壮" },
            { "cat": "CASES", "title": "[ICFS] core文件一直产生", "cmd": "1.登录到对应节点 执行 file /var/log/core.1046480   如果输出如下 就是icfs-client过多\nELF 64-bit LSB core file, x86-64, version 1 (SYSV), SVR4-style, from 'logrotate /etc/logrotate.d/icfs', real uid: 0, effective uid: 0, real gid: 0, effective gid: 0, execfn: '/sbin/logrotate', platform: 'x86_64'\n2.删除icfs-client文件\nfind /var/log/icfs -mtime +2 -name 'icfs-client.*.log' -exec rm {} \\;", "desc": "故障原因: 其中一种原因是因为系统目录下icfs-client过多", "author": "王朝阳" },
            { "cat": "CASES", "title": "[ICFS] sas链路异常", "cmd": "1，执行scrtnycli.x86_64后ctrl +c 退出  确认机器上边的expand（假设为12U的机器 只有1个expand卡） 注：如果是G7机型，用g4Xdiagnostics.x86_64\n2.执行  scrtnycli.x86_64 -i 1 phy -err 确认报错槽位是否与其他的槽位输出的信息不一致\n3.执行  scrtnycli.x86_64 -i 1 cli phyinfo  确认phy是否与其他的不一致 有变化  （SATA列为1才是硬盘）\n4.根据3找到的异常硬盘 找到对应的ATTACHED SAS ADDR值  以查询到的值为（56C92BF0_02D3358C）做案例\n5.通过命令查询所有硬盘的ATTACHENSASADDR值 \n每个硬盘都执行 sg_inq -p OX83 /dev/sda\n批量查询所有硬盘种ATTACHED SAS ADDR\nfor i in /dev/sd[a-z];do echo \"$i\"; sg_inq -p OX83 \"$i\";donelgrep -i -B 30 \"56c92BF002D3358c\"\n6.确认硬盘后换盘处理问题\n", "desc": "故障原因: 其中一种硬盘类的", "author": "王朝阳" },
            { "cat": "CASES", "title": "[硬件] 更换主板后进不去系统", "cmd": "更换主板后进不去系统：bios设置，sata控制器和ssata 控制器没有设置为raid模式\n\n1，看看bios设置，sata控制器和ssata 控制器有没有设置为raid模式\n2，Bios第三个界面里，Platform那个", "desc": "（暂无详细说明）", "author": "付壮壮" },
            { "cat": "CASES", "title": "[GPFS] gpfs客户端ls卡住", "cmd": "1.先停止：/usr/lpp/mmfs/bin/mmshutdown \n2.再启动：/usr/lpp/mmfs/bin/mmstartup", "desc": "（暂无详细说明）", "author": "郭嘉良" },
            { "cat": "CASES", "title": "[ICFS] cap不释放", "cmd": "使用cap_release_v2.2脚本恢复", "desc": "（暂无详细说明）", "author": "杨颜宁" },
            { "cat": "CASES", "title": "[DP2000] dp2000连接与磁带库问题", "cmd": "dp2000软件方面是不支持备份转移的，也不支持带库的链接\n\n硬件方面，带库是必须要用到fc协议卡的，不能用以太网协议，dp2000上的硬件方面也是不支持的", "desc": "（暂无详细说明）", "author": "付壮壮" },
            { "cat": "CASES", "title": "[DP2000] dp2000备份任务时提示查看已经存在的mount目录失败", "cmd": "1.cd /opt/BF***/hxc/backup/ ,     vim   Server.xml中  UseCustomShell  0改为1\n2.重启代理服务，./MSABackupAgentService  restart", "desc": "（暂无详细说明）", "author": "王朝阳" },
            { "cat": "CASES", "title": "[DP2000] dp2000备份sqlserver时 全量备份可以 增量备份失败", "cmd": "sqlserver限制，简单模式不允许做增量备份  需要让客户DBA更换数据库模式", "desc": "（暂无详细说明）", "author": "王朝阳" },
            { "cat": "CASES", "title": "[ICFS] 硬盘上电时长超限bmc有告警，机器有红灯", "cmd": "1、关闭磁盘亚健康对应检测项：\nansible all -m shell -a \"sudo sed -i 's/diskuptime = 1//g' /etc/subhealth.ini\"\nansible all -m shell -a \"sudo rm /etc/subhealth.ini.save -f\"\n2、关闭管软上电时长对应告警、清除已发生发告警\n3、以上执行后将不会新增告警和磁盘红灯，但是对于当前已经亮红灯的硬盘，需要通过点亮/取消定位灯来手动消除BMC告警和红灯", "desc": "（暂无详细说明）", "author": "郭嘉良" },
            { "cat": "CASES", "title": "[ICFS] cifs客户端闪断", "cmd": "客户端闪断，本地组策略优化，运行gpedit.msc ，\n选择【Windows设置】-【安全设置】-【本地策略】-【安全选项】右键点击【属性】调整“暂停会话前所需的空闲时间数量”为99999相当于禁止，默认为15分钟，管理员执行gpupdate/force，强制刷本地组策略，无须重启。", "desc": "（暂无详细说明）", "author": "郭嘉良" },
            { "cat": "CASES", "title": "[带库] 清洗带库", "cmd": "参考文档《磁带清洗判断及操作步骤.docx》", "desc": "（暂无详细说明）", "author": "冯立晓" },
            { "cat": "CASES", "title": "[ICFS] 换盘（3.7.30.20版本，盘系统下不识别，管软无法退盘）", "cmd": "3.7.30.20，版本盘系统下不识别，管软无法退盘。无法进行正常管软换盘流程。\n（因为此版本不支持不识别盘符的情况下退盘）处理办法：把新盘插上去之后再退盘操作，再执行加载新盘，以完成标准换盘流程。", "desc": "（暂无详细说明）", "author": "杨颜宁" },
            { "cat": "CASES", "title": "[GPFS] 换盘的时候关闭写缓存失败", "cmd": "先用mmlsconfig命令查询WCE是否开启,如果开启的话直接执行sdparm --set WCE=0 /dev/sXX ", "desc": "（暂无详细说明）", "author": "郭嘉良" },
            { "cat": "CASES", "title": "[ICFS] 负载均衡服务异常", "cmd": "管软报节点负载均衡服务异常，systemctl status pdns 状态正常，ps -ef | grep loadbalance 发现无此进程，重启systemctl restart pdns后，ps -ef | grep loadbalance 进程重新加载出现，后此告警消失。", "desc": "故障原因: 判定标准：1.通过“systemctl status pdns”命令查询pdns服务状态，如非running则上报告警。2.若执行ps -ef|grep loadbalance | grep –v | wcl -l >0, 否则上报告警", "author": "杨颜宁" },
            { "cat": "CASES", "title": "[ICFS] 换盘加盘失败", "cmd": "systemctl status udev\nsystemctl restart udev", "desc": "故障原因: 坏盘导致 udev 服务异常", "author": "冯立晓" },
            { "cat": "CASES", "title": "[硬件] BMC不通，网口物理故障", "cmd": "查看配置清单是否有管理板（IntelG7或者海光四号机型开始有），1.如有：更换管理板。2.如无管理板，则更换主板。\n", "desc": "故障原因: bmc网口或bmc芯片问题", "author": "杨颜宁" },
            { "cat": "CASES", "title": "[GPFS] 换盘时not-ok出现非故障硬盘的报错 且查找pdisk槽位并未看到有盘符\n如图中的n001p006", "cmd": "需要把故障盘重新插回去，报错就没了", "desc": "故障原因: 故障盘引起的", "author": "王朝阳" },
            { "cat": "CASES", "title": "[GPFS] 换盘时如果nvme盘为蛟容系列的 格式化盘的时候需要更改为2", "cmd": "格式化盘的命令如图\nnvme format -f -lbaf=2 /dev/nume5n1", "desc": "故障原因: 硬盘类型引起的", "author": "王朝阳" },

        let currentCategory = 'ICFS';

        // 切换左侧标签
        function switchTab(cat) {
            currentCategory = cat;
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active');
                if(el.getAttribute('onclick').includes(cat)) el.classList.add('active');
            });
            renderCards(); 
            document.getElementById('searchBar').value = '';
        }

        // 渲染卡片核心逻辑
        function renderCards(filterQuery = '') {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            
            const lowerFilter = filterQuery.toLowerCase();
            const filteredData = database.filter(item => {
                if (filterQuery) {
                    return item.title.toLowerCase().includes(lowerFilter) || 
                           item.cmd.toLowerCase().includes(lowerFilter) || 
                           item.desc.toLowerCase().includes(lowerFilter);
                }
                return item.cat === currentCategory;
            });

            if(filteredData.length === 0) {
                container.innerHTML = '<div style="color:#999;">未找到匹配的技术文档，请尝试更换关键词。</div>';
                return;
            }

            filteredData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'info-card';
                const safeCmd = item.cmd.replace(/`/g, '\\`').replace(/'/g, "\\'");
                const authorHtml = item.author ? `<div class="author-tag">提交人：${item.author}</div>` : '';
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-title">${item.title}</div>
                        <span class="card-tag">${item.cat}</span>
                    </div>
                    <div class="cmd-wrapper">
                        <pre><code>${item.cmd}</code></pre>
                        <button class="copy-btn" onclick="copyCmd(this, \`${safeCmd}\`)">复制</button>
                    </div>
                    <div class="card-desc">${item.desc}</div>
                    ${authorHtml}
                `;
                container.appendChild(card);
            });
        }

        // 触发搜索
        function filterCards() {
            const query = document.getElementById('searchBar').value;
            renderCards(query);
        }

        // 一键复制并改变按钮状态
        function copyCmd(btnElement, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btnElement.innerText;
                btnElement.innerText = '已复制 ✔';
                btnElement.classList.add('success');
                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.classList.remove('success');
                }, 2000);
            }).catch(err => {
                alert('复制失败，请手动选择复制。');
            });
        }

        // 页面加载完毕初始化
        window.onload = () => renderCards();
    </script>
